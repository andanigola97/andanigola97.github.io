<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Andani Andy Gola | Creative Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }
    header {
      text-align: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 2.5rem;
    }
    p {
      color: #aaa;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    footer {
      text-align: center;
      padding: 20px;
      color: #666;
    }
    a {
      color: #ff7a00;
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Andani Andy Gola</h1>
  <p>Creative Developer | Video Editor | Visual Storyteller</p>
</header>

<section class="projects">
  <div class="card">
    <h3>Project 1</h3>
    <p>Short description of your work.</p>
    <a href="#">View Project</a>
  </div>

  <div class="card">
    <h3>Project 2</h3>
    <p>Short description of your work.</p>
    <a href="#">View Project</a>
  </div>
</section>

<footer>
  <p>© 2026 Andani Andy Gola</p>
</footer>

</body>
</html>
